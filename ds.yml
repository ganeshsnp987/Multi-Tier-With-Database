---
# MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: webapps
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - image: mysql:8
          name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Test@123"
            - name: MYSQL_DATABASE
              value: "bankdb"   # ✅ FIXED (same everywhere)
          ports:
            - containerPort: 3306
              name: mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u root -pTest@123"
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6

---
# MySQL Service
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: webapps
spec:
  ports:
    - port: 3306
  selector:
    app: mysql

---
# Java Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp
  namespace: webapps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bankapp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: wait-for-mysql
          image: busybox
          command:
            - sh
            - -c
            - "until nc -z mysql-service 3306; do echo 'Waiting for MySQL...'; sleep 3; done; echo 'MySQL is ready!'"
      containers:
        - name: bankapp
          image: ganeshsnp987/bankapp:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/bankdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"  # ✅ FIXED
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: "Test@123"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3

---
# Bank Application Service
apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: webapps
spec:
  type: NodePort
  selector:
    app: bankapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30085
